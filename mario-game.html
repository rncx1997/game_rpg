<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Super Mario Pixel - Main Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            touch-action: none;
        }
        .game-wrapper {
            position: relative;
            width: 100%;
            max-width: 800px;
            text-align: center;
        }
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 14px;
            background: #1a1a2e;
            border: 2px solid #333;
            border-bottom: none;
            color: #fff;
            font-size: 14px;
            font-weight: bold;
        }
        .game-header .score { color: #fbbf24; }
        .game-header .coins { color: #f59e0b; }
        .game-header .lives { color: #ef4444; }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 800 / 500;
            border: 2px solid #333;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            background: #000;
        }
        .controls-info {
            color: #666;
            font-size: 11px;
            padding: 6px;
            background: #1a1a2e;
            border: 1px solid #333;
            border-top: none;
        }
        .controls-info kbd {
            background: #333;
            padding: 2px 6px;
            border-radius: 3px;
            color: #aaa;
            font-size: 10px;
        }
        .back-link {
            display: inline-block;
            margin-top: 8px;
            color: #7c3aed;
            text-decoration: none;
            font-size: 13px;
        }
        .back-link:hover { text-decoration: underline; }

        /* Joystick overlay - only shown on touch devices */
        .touch-controls {
            display: none;
            position: absolute;
            bottom: 50px;
            left: 0;
            right: 0;
            padding: 0 16px;
            pointer-events: none;
            z-index: 10;
        }

        .dpad {
            position: absolute;
            bottom: 0;
            left: 20px;
            display: flex;
            gap: 12px;
            pointer-events: auto;
        }

        .jump-btn {
            position: absolute;
            bottom: 0;
            right: 20px;
            pointer-events: auto;
        }

        .ctrl-btn {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.8);
            font-size: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: none;
            transition: background 0.1s, transform 0.1s;
            -webkit-tap-highlight-color: transparent;
            backdrop-filter: blur(2px);
            cursor: pointer;
        }

        .ctrl-btn:active,
        .ctrl-btn.pressed {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(0.92);
            border-color: rgba(255, 255, 255, 0.7);
        }

        .jump-btn .ctrl-btn {
            width: 80px;
            height: 80px;
            font-size: 18px;
            background: rgba(37, 99, 235, 0.2);
            border-color: rgba(37, 99, 235, 0.5);
            color: #60a5fa;
            font-weight: bold;
        }

        .jump-btn .ctrl-btn:active,
        .jump-btn .ctrl-btn.pressed {
            background: rgba(37, 99, 235, 0.4);
            border-color: rgba(37, 99, 235, 0.8);
        }

        @media (hover: none) and (pointer: coarse) {
            .touch-controls { display: block; }
        }

        @media (max-width: 600px) {
            .game-header { font-size: 11px; padding: 6px 10px; }
            .game-header span:nth-child(2),
            .game-header span:nth-child(3) { display: none; }
            .ctrl-btn { width: 56px; height: 56px; font-size: 22px; }
            .jump-btn .ctrl-btn { width: 68px; height: 68px; font-size: 15px; }
            .touch-controls { bottom: 30px; }
            .back-link { font-size: 11px; }
        }

        @media (max-width: 400px) {
            .ctrl-btn { width: 48px; height: 48px; font-size: 18px; }
            .jump-btn .ctrl-btn { width: 58px; height: 58px; font-size: 13px; }
            .touch-controls { bottom: 20px; }
            .dpad { left: 10px; gap: 8px; }
            .jump-btn { right: 10px; }
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="game-header">
            <span>MARIO <span style="color:#7c3aed;">PIXEL</span></span>
            <span><span class="score" id="scoreDisplay">0</span></span>
            <span><span class="coins" id="coinDisplay">0</span></span>
            <span><span class="lives" id="livesDisplay">3</span></span>
        </div>

        <div style="position:relative;display:inline-block;width:100%;">
            <canvas id="gameCanvas" width="800" height="500"></canvas>

            <!-- Touch Controls Overlay -->
            <div class="touch-controls" id="touchControls">
                <div class="dpad" id="dpad">
                    <button class="ctrl-btn" id="btnLeft" aria-label="Kiri">&#x25C0;</button>
                    <button class="ctrl-btn" id="btnRight" aria-label="Kanan">&#x25B6;</button>
                </div>
                <div class="jump-btn" id="jumpBtnContainer">
                    <button class="ctrl-btn" id="btnJump" aria-label="Lompat">LOM</button>
                </div>
            </div>
        </div>

        <div class="controls-info">
            <kbd>&larr;</kbd> <kbd>&rarr;</kbd> Gerak &nbsp;|&nbsp; <kbd>Spasi</kbd> Lompat &nbsp;|&nbsp; <kbd>R</kbd> Restart
        </div>
        <a href="index.html" class="back-link">&larr; Kembali</a>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreDisplay');
        const coinSpan = document.getElementById('coinDisplay');
        const livesSpan = document.getElementById('livesDisplay');

        // Game constants
        const GRAVITY = 0.6;
        const JUMP_FORCE = -12;
        const MOVE_SPEED = 4;
        const TILE = 32;

        // Game state
        let score = 0;
        let coins = 0;
        let lives = 3;
        let gameOver = false;
        let gameWin = false;
        let cameraX = 0;
        let keys = {};

        // Colors
        const COLORS = {
            sky: '#5c94fc',
            ground: '#c84c0c',
            groundDark: '#a03800',
            brick: '#c84c0c',
            brickLine: '#7c3aed',
            pipe: '#2ecc40',
            pipeDark: '#27ae60',
            coin: '#fbbf24',
            coinShine: '#f59e0b',
            marioRed: '#e74c3c',
            marioSkin: '#f0c8a0',
            marioBrown: '#8B4513',
            marioBlue: '#3b82f6',
            goomba: '#8B4513',
            goombaDark: '#5c2e00',
            flagPole: '#2ecc40',
            flag: '#fbbf24',
            cloud: '#fff',
            bush: '#2ecc40',
            hill: '#4a7c3f',
            block: '#f0c040',
            blockBorder: '#c8a020',
            text: '#fff',
            bgDark: '#1a1a2e'
        };

        // Mario
        const mario = {
            x: 80,
            y: 300,
            width: 24,
            height: 32,
            vx: 0,
            vy: 0,
            onGround: false,
            facing: 1,
            frame: 0,
            frameTimer: 0,
            jumpHeld: false,
            isBig: false
        };

        // Level data
        const LEVEL_WIDTH = 4000;
        const GROUND_Y = 436;

        let platforms = [];
        let enemies = [];
        let coinList = [];
        let pipes = [];
        let bricks = [];
        let questionBlocks = [];
        let flag = null;

        function buildLevel() {
            platforms = [];
            enemies = [];
            coinList = [];
            pipes = [];
            bricks = [];
            questionBlocks = [];
            flag = null;

            for (let x = 0; x < LEVEL_WIDTH; x += TILE) {
                platforms.push({ x, y: GROUND_Y, w: TILE, h: TILE, type: 'ground' });
                platforms.push({ x, y: GROUND_Y + TILE, w: TILE, h: TILE, type: 'ground' });
            }

            const gaps = [
                { start: 1400, end: 1500 },
                { start: 2200, end: 2320 },
                { start: 3100, end: 3200 }
            ];
            platforms = platforms.filter(p => {
                for (const g of gaps) {
                    if (p.x >= g.start && p.x < g.end && p.y === GROUND_Y) return false;
                }
                return true;
            });

            const floatPlats = [
                { x: 500, y: 340, w: 4 }, { x: 750, y: 280, w: 3 },
                { x: 1000, y: 300, w: 4 }, { x: 1300, y: 260, w: 3 },
                { x: 1600, y: 300, w: 4 }, { x: 1900, y: 240, w: 3 },
                { x: 2400, y: 300, w: 4 }, { x: 2700, y: 260, w: 3 },
                { x: 3000, y: 300, w: 4 }, { x: 3400, y: 280, w: 3 }
            ];
            for (const p of floatPlats) {
                for (let i = 0; i < p.w; i++) {
                    platforms.push({ x: p.x + i * TILE, y: p.y, w: TILE, h: TILE, type: 'brick' });
                }
            }

            const brickPositions = [
                { x: 350, y: 240 }, { x: 380, y: 240 }, { x: 410, y: 240 },
                { x: 1100, y: 200 }, { x: 1130, y: 200 },
                { x: 2000, y: 220 }, { x: 2030, y: 220 }, { x: 2060, y: 220 },
                { x: 2600, y: 200 }, { x: 2630, y: 200 },
                { x: 3200, y: 220 }, { x: 3230, y: 220 },
            ];
            for (const b of brickPositions) {
                bricks.push({ x: b.x, y: b.y, w: TILE, h: TILE, broken: false });
                platforms.push({ x: b.x, y: b.y, w: TILE, h: TILE, type: 'brick' });
            }

            const qBlocks = [
                { x: 350, y: 200 }, { x: 800, y: 240 },
                { x: 1200, y: 200 }, { x: 1800, y: 200 },
                { x: 2500, y: 200 }, { x: 2900, y: 240 },
                { x: 3500, y: 200 }
            ];
            for (const q of qBlocks) {
                questionBlocks.push({ x: q.x, y: q.y, w: TILE, h: TILE, used: false });
                platforms.push({ x: q.x, y: q.y, w: TILE, h: TILE, type: 'question' });
            }

            const pipePositions = [
                { x: 600, h: 2 }, { x: 900, h: 3 }, { x: 1500, h: 2 },
                { x: 2100, h: 3 }, { x: 2800, h: 2 }, { x: 3600, h: 3 }
            ];
            for (const p of pipePositions) {
                pipes.push({ x: p.x, y: GROUND_Y - p.h * TILE, h: p.h });
                for (let i = 0; i < p.h; i++) {
                    platforms.push({ x: p.x, y: GROUND_Y - (i + 1) * TILE, w: TILE * 2, h: TILE, type: 'pipe' });
                    platforms.push({ x: p.x + TILE, y: GROUND_Y - (i + 1) * TILE, w: TILE, h: TILE, type: 'pipe' });
                }
            }

            const coinPositions = [
                { x: 200, y: 300 }, { x: 250, y: 300 }, { x: 300, y: 300 },
                { x: 520, y: 280 }, { x: 550, y: 280 },
                { x: 770, y: 220 }, { x: 800, y: 220 },
                { x: 1050, y: 240 }, { x: 1080, y: 240 },
                { x: 1320, y: 200 }, { x: 1350, y: 200 },
                { x: 1650, y: 240 }, { x: 1680, y: 240 },
                { x: 1950, y: 180 }, { x: 1980, y: 180 },
                { x: 2450, y: 240 }, { x: 2480, y: 240 },
                { x: 2750, y: 200 }, { x: 2780, y: 200 },
                { x: 3050, y: 240 }, { x: 3080, y: 240 },
                { x: 3450, y: 220 }, { x: 3480, y: 220 },
                { x: 3700, y: 300 }, { x: 3730, y: 300 }, { x: 3760, y: 300 }
            ];
            for (const c of coinPositions) {
                coinList.push({ x: c.x, y: c.y, w: 16, h: 16, collected: false });
            }

            const enemyPositions = [
                { x: 400 }, { x: 700, range: 100 }, { x: 1100 },
                { x: 1450 }, { x: 1700, range: 120 },
                { x: 2150 }, { x: 2350, range: 100 },
                { x: 2650 }, { x: 2950, range: 120 },
                { x: 3300 }, { x: 3550, range: 100 }
            ];
            for (const e of enemyPositions) {
                enemies.push({
                    x: e.x,
                    y: GROUND_Y - TILE,
                    w: 28,
                    h: 28,
                    vx: -1.5,
                    alive: true,
                    range: e.range || 80,
                    startX: e.x
                });
            }

            flag = { x: 3900, y: 200 };
        }

        function resetGame() {
            mario.x = 80;
            mario.y = 300;
            mario.vx = 0;
            mario.vy = 0;
            mario.onGround = false;
            mario.facing = 1;
            mario.frame = 0;
            cameraX = 0;
            gameOver = false;
            gameWin = false;
            score = 0;
            coins = 0;
            lives = 3;
            buildLevel();
            updateDisplay();
        }

        function updateDisplay() {
            scoreSpan.textContent = score;
            coinSpan.textContent = coins;
            livesSpan.textContent = lives;
        }

        function rectCollide(a, b) {
            return a.x < b.x + b.w && a.x + a.w > b.x &&
                   a.y < b.y + b.h && a.y + a.h > b.y;
        }

        function handleCollisions() {
            mario.onGround = false;

            for (const plat of platforms) {
                if (!rectCollide(
                    { x: mario.x, y: mario.y, w: mario.width, h: mario.height },
                    { x: plat.x, y: plat.y, w: plat.w, h: plat.h }
                )) continue;

                const marioCenterX = mario.x + mario.width / 2;
                const marioCenterY = mario.y + mario.height / 2;
                const platCenterX = plat.x + plat.w / 2;
                const platCenterY = plat.y + plat.h / 2;

                const overlapX = (mario.width / 2 + plat.w / 2) - Math.abs(marioCenterX - platCenterX);
                const overlapY = (mario.height / 2 + plat.h / 2) - Math.abs(marioCenterY - platCenterY);

                if (overlapX < overlapY) {
                    if (marioCenterX < platCenterX) {
                        mario.x = plat.x - mario.width;
                    } else {
                        mario.x = plat.x + plat.w;
                    }
                } else {
                    if (marioCenterY < platCenterY) {
                        mario.y = plat.y - mario.height;
                        mario.vy = 0;
                        mario.onGround = true;
                    } else {
                        mario.y = plat.y + plat.h;
                        mario.vy = 2;
                    }
                }
            }

            for (const c of coinList) {
                if (c.collected) continue;
                if (rectCollide(
                    { x: mario.x, y: mario.y, w: mario.width, h: mario.height },
                    { x: c.x, y: c.y, w: c.w, h: c.h }
                )) {
                    c.collected = true;
                    coins++;
                    score += 100;
                    updateDisplay();
                }
            }

            for (const e of enemies) {
                if (!e.alive) continue;
                if (!rectCollide(
                    { x: mario.x, y: mario.y, w: mario.width, h: mario.height },
                    { x: e.x, y: e.y, w: e.w, h: e.h }
                )) continue;

                if (mario.vy > 0 && mario.y + mario.height - e.y < 20) {
                    e.alive = false;
                    mario.vy = JUMP_FORCE / 1.5;
                    score += 200;
                    updateDisplay();
                } else {
                    marioHit();
                }
            }

            if (flag && rectCollide(
                { x: mario.x, y: mario.y, w: mario.width, h: mario.height },
                { x: flag.x, y: flag.y, w: 20, h: 200 }
            )) {
                gameWin = true;
            }

            if (mario.y > 600) {
                marioHit();
            }
        }

        function marioHit() {
            lives--;
            updateDisplay();
            if (lives <= 0) {
                gameOver = true;
                return;
            }
            mario.x = 80;
            mario.y = 300;
            mario.vx = 0;
            mario.vy = 0;
            cameraX = 0;
        }

        function update() {
            if (gameOver || gameWin) return;

            if (keys['ArrowLeft'] || keys['a']) {
                mario.vx = -MOVE_SPEED;
                mario.facing = -1;
            } else if (keys['ArrowRight'] || keys['d']) {
                mario.vx = MOVE_SPEED;
                mario.facing = 1;
            } else {
                mario.vx *= 0.7;
                if (Math.abs(mario.vx) < 0.1) mario.vx = 0;
            }

            if ((keys[' '] || keys['ArrowUp'] || keys['w']) && mario.onGround) {
                mario.vy = JUMP_FORCE;
                mario.onGround = false;
            }

            mario.vy += GRAVITY;
            if (mario.vy > 15) mario.vy = 15;

            mario.x += mario.vx;
            mario.y += mario.vy;

            if (mario.x < 0) mario.x = 0;
            if (mario.x > LEVEL_WIDTH - mario.width) mario.x = LEVEL_WIDTH - mario.width;

            handleCollisions();

            if (Math.abs(mario.vx) > 1 && mario.onGround) {
                mario.frameTimer++;
                if (mario.frameTimer > 6) {
                    mario.frame = (mario.frame + 1) % 4;
                    mario.frameTimer = 0;
                }
            } else if (mario.onGround) {
                mario.frame = 0;
            }

            cameraX = mario.x - 300;
            if (cameraX < 0) cameraX = 0;
            if (cameraX > LEVEL_WIDTH - 800) cameraX = LEVEL_WIDTH - 800;

            for (const e of enemies) {
                if (!e.alive) continue;
                e.x += e.vx;
                if (e.x < e.startX - e.range || e.x > e.startX + e.range) {
                    e.vx *= -1;
                }
            }
        }

        function drawPixelMario(x, y, frame, facing) {
            const p = 2;
            ctx.fillStyle = COLORS.marioRed;
            ctx.fillRect(x + 4 * p, y + 8 * p, 4 * p, 4 * p);

            ctx.fillStyle = COLORS.marioSkin;
            ctx.fillRect(x + 4 * p, y + 2 * p, 4 * p, 4 * p);

            ctx.fillStyle = COLORS.marioRed;
            ctx.fillRect(x + 3 * p, y, 6 * p, 2 * p);
            ctx.fillRect(x + 2 * p, y + 1 * p, 2 * p, 1 * p);

            ctx.fillStyle = '#000';
            if (facing > 0) {
                ctx.fillRect(x + 6 * p, y + 3 * p, 1 * p, 1 * p);
            } else {
                ctx.fillRect(x + 5 * p, y + 3 * p, 1 * p, 1 * p);
            }

            ctx.fillStyle = COLORS.marioBrown;
            ctx.fillRect(x + 4 * p, y + 5 * p, 4 * p, 1 * p);

            ctx.fillStyle = COLORS.marioBlue;
            if (frame === 0 || frame === 2) {
                ctx.fillRect(x + 3 * p, y + 12 * p, 6 * p, 4 * p);
            } else if (frame === 1) {
                ctx.fillRect(x + 2 * p, y + 12 * p, 6 * p, 4 * p);
            } else {
                ctx.fillRect(x + 4 * p, y + 12 * p, 6 * p, 4 * p);
            }

            ctx.fillStyle = COLORS.marioBrown;
            if (!mario.onGround) {
                ctx.fillRect(x + 3 * p, y + 16 * p, 2 * p, 2 * p);
                ctx.fillRect(x + 7 * p, y + 15 * p, 2 * p, 2 * p);
            } else if (frame === 0) {
                ctx.fillRect(x + 4 * p, y + 16 * p, 2 * p, 2 * p);
                ctx.fillRect(x + 6 * p, y + 16 * p, 2 * p, 2 * p);
            } else if (frame === 1) {
                ctx.fillRect(x + 3 * p, y + 16 * p, 2 * p, 2 * p);
                ctx.fillRect(x + 7 * p, y + 16 * p, 2 * p, 2 * p);
            } else {
                ctx.fillRect(x + 5 * p, y + 16 * p, 2 * p, 2 * p);
                ctx.fillRect(x + 7 * p, y + 16 * p, 2 * p, 2 * p);
            }

            ctx.fillStyle = COLORS.marioBrown;
            ctx.fillRect(x + 3 * p, y + 18 * p, 3 * p, 1 * p);
            ctx.fillRect(x + 6 * p, y + 18 * p, 3 * p, 1 * p);
        }

        function drawPixelGoomba(x, y) {
            const p = 2;
            ctx.fillStyle = COLORS.goomba;
            ctx.fillRect(x + 2 * p, y + 4 * p, 10 * p, 8 * p);
            ctx.fillRect(x + 1 * p, y + 2 * p, 12 * p, 4 * p);
            ctx.fillStyle = COLORS.goombaDark;
            ctx.fillRect(x + 1 * p, y + 12 * p, 4 * p, 2 * p);
            ctx.fillRect(x + 9 * p, y + 12 * p, 4 * p, 2 * p);
            ctx.fillStyle = '#fff';
            ctx.fillRect(x + 3 * p, y + 3 * p, 2 * p, 2 * p);
            ctx.fillRect(x + 9 * p, y + 3 * p, 2 * p, 2 * p);
            ctx.fillStyle = '#000';
            ctx.fillRect(x + 4 * p, y + 3 * p, 1 * p, 1 * p);
            ctx.fillRect(x + 10 * p, y + 3 * p, 1 * p, 1 * p);
        }

        function draw() {
            ctx.fillStyle = COLORS.sky;
            ctx.fillRect(0, 0, 800, 500);

            ctx.save();
            ctx.translate(-cameraX, 0);

            ctx.fillStyle = COLORS.hill;
            for (let i = 0; i < 5; i++) {
                const hx = i * 800 + 100;
                const hw = 200;
                ctx.beginPath();
                ctx.arc(hx, GROUND_Y + TILE, hw, Math.PI, 0);
                ctx.fill();
            }

            ctx.fillStyle = COLORS.cloud;
            for (let i = 0; i < 8; i++) {
                const cx = i * 500 + 50;
                const cy = 40 + (i % 3) * 30;
                ctx.fillRect(cx, cy, 60, 20);
                ctx.fillRect(cx + 10, cy - 10, 40, 10);
                ctx.fillRect(cx + 20, cy - 20, 20, 10);
            }

            ctx.fillStyle = COLORS.bush;
            for (let i = 0; i < 6; i++) {
                const bx = i * 700 + 200;
                const by = GROUND_Y - 10;
                ctx.fillRect(bx, by, 80, 10);
                ctx.fillRect(bx + 10, by - 10, 60, 10);
                ctx.fillRect(bx + 20, by - 20, 40, 10);
            }

            for (const plat of platforms) {
                if (plat.type === 'ground') {
                    ctx.fillStyle = plat.y === GROUND_Y ? COLORS.ground : COLORS.groundDark;
                    ctx.fillRect(plat.x, plat.y, plat.w, plat.h);
                    if (plat.y === GROUND_Y) {
                        ctx.strokeStyle = COLORS.groundDark;
                        ctx.lineWidth = 1;
                        ctx.strokeRect(plat.x, plat.y, plat.w, plat.h);
                    }
                }
            }

            for (const plat of platforms) {
                if (plat.type === 'brick') {
                    ctx.fillStyle = COLORS.brick;
                    ctx.fillRect(plat.x, plat.y, plat.w, plat.h);
                    ctx.strokeStyle = COLORS.brickLine;
                    ctx.lineWidth = 1;
                    ctx.strokeRect(plat.x, plat.y, plat.w, plat.h);
                    ctx.strokeStyle = COLORS.brickLine;
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(plat.x, plat.y + plat.h / 2);
                    ctx.lineTo(plat.x + plat.w, plat.y + plat.h / 2);
                    ctx.moveTo(plat.x + plat.w / 2, plat.y);
                    ctx.lineTo(plat.x + plat.w / 2, plat.y + plat.h / 2);
                    ctx.stroke();
                }
            }

            for (const q of questionBlocks) {
                ctx.fillStyle = q.used ? '#888' : COLORS.block;
                ctx.fillRect(q.x, q.y, q.w, q.h);
                ctx.strokeStyle = COLORS.blockBorder;
                ctx.lineWidth = 2;
                ctx.strokeRect(q.x, q.y, q.w, q.h);
                if (!q.used) {
                    ctx.fillStyle = '#fff';
                    ctx.font = '20px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('?', q.x + q.w / 2, q.y + q.h - 6);
                }
            }

            for (const p of pipes) {
                ctx.fillStyle = COLORS.pipe;
                ctx.fillRect(p.x + 2, p.y + TILE, TILE * 2 - 4, (p.h - 1) * TILE);
                ctx.fillStyle = COLORS.pipeDark;
                ctx.fillRect(p.x, p.y, TILE * 2, TILE);
                ctx.fillStyle = COLORS.pipe;
                ctx.fillRect(p.x + 2, p.y + 2, TILE * 2 - 4, TILE - 4);
                ctx.fillStyle = 'rgba(255,255,255,0.2)';
                ctx.fillRect(p.x + 4, p.y + 4, 6, TILE - 8);
            }

            for (const c of coinList) {
                if (c.collected) continue;
                const pulse = Math.sin(Date.now() / 200 + c.x) * 2;
                ctx.fillStyle = COLORS.coin;
                ctx.beginPath();
                ctx.ellipse(c.x + 8, c.y + 8 + pulse, 6, 8, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = COLORS.coinShine;
                ctx.beginPath();
                ctx.ellipse(c.x + 6, c.y + 6 + pulse, 2, 3, 0, 0, Math.PI * 2);
                ctx.fill();
            }

            for (const e of enemies) {
                if (!e.alive) continue;
                drawPixelGoomba(e.x, e.y);
            }

            if (flag) {
                ctx.fillStyle = COLORS.flagPole;
                ctx.fillRect(flag.x + 8, flag.y, 4, GROUND_Y - flag.y + TILE);
                ctx.fillStyle = COLORS.flag;
                ctx.beginPath();
                ctx.moveTo(flag.x + 8, flag.y);
                ctx.lineTo(flag.x + 8 + 40, flag.y + 20);
                ctx.lineTo(flag.x + 8, flag.y + 40);
                ctx.fill();
                ctx.fillStyle = '#2ecc40';
                ctx.beginPath();
                ctx.arc(flag.x + 10, flag.y, 6, 0, Math.PI * 2);
                ctx.fill();
            }

            if (!gameOver) {
                drawPixelMario(mario.x, mario.y, mario.frame, mario.facing);
            }

            ctx.restore();

            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, 800, 500);
                ctx.fillStyle = COLORS.text;
                ctx.font = '48px "Courier New", monospace';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', 400, 240);
                ctx.font = '18px "Courier New", monospace';
                ctx.fillText('Tekan R untuk restart', 400, 290);
            }

            if (gameWin) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, 800, 500);
                ctx.fillStyle = '#fbbf24';
                ctx.font = '48px "Courier New", monospace';
                ctx.textAlign = 'center';
                ctx.fillText('SELAMAT!', 400, 220);
                ctx.fillStyle = COLORS.text;
                ctx.font = '24px "Courier New", monospace';
                ctx.fillText('Kamu menyelesaikan level!', 400, 270);
                ctx.font = '18px "Courier New", monospace';
                ctx.fillText('Skor: ' + score + ' | Koin: ' + coins, 400, 310);
                ctx.font = '16px "Courier New", monospace';
                ctx.fillText('Tekan R untuk main lagi', 400, 350);
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Keyboard input
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (e.key === 'r' || e.key === 'R') {
                if (gameOver || gameWin) resetGame();
            }
            if ((e.key === ' ' || e.key === 'ArrowUp') && !gameOver && !gameWin) {
                e.preventDefault();
            }
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });

        // Touch joystick controls
        const btnLeft = document.getElementById('btnLeft');
        const btnRight = document.getElementById('btnRight');
        const btnJump = document.getElementById('btnJump');

        function setupTouchButton(el, keyDown, keyUp) {
            const start = (e) => {
                e.preventDefault();
                keys[keyDown] = true;
                if (keyUp) keys[keyUp] = false;
                el.classList.add('pressed');
            };
            const end = (e) => {
                e.preventDefault();
                keys[keyDown] = false;
                el.classList.remove('pressed');
            };

            el.addEventListener('touchstart', start, { passive: false });
            el.addEventListener('touchend', end, { passive: false });
            el.addEventListener('touchcancel', end, { passive: false });
            el.addEventListener('mousedown', start);
            el.addEventListener('mouseup', end);
            el.addEventListener('mouseleave', end);
        }

        setupTouchButton(btnLeft, 'ArrowLeft', 'ArrowRight');
        setupTouchButton(btnRight, 'ArrowRight', 'ArrowLeft');

        btnJump.addEventListener('touchstart', (e) => {
            e.preventDefault();
            keys[' '] = true;
            btnJump.classList.add('pressed');
        }, { passive: false });

        btnJump.addEventListener('touchend', (e) => {
            e.preventDefault();
            keys[' '] = false;
            btnJump.classList.remove('pressed');
        }, { passive: false });

        btnJump.addEventListener('touchcancel', (e) => {
            keys[' '] = false;
            btnJump.classList.remove('pressed');
        });

        btnJump.addEventListener('mousedown', () => {
            keys[' '] = true;
            btnJump.classList.add('pressed');
        });

        btnJump.addEventListener('mouseup', () => {
            keys[' '] = false;
            btnJump.classList.remove('pressed');
        });

        btnJump.addEventListener('mouseleave', () => {
            keys[' '] = false;
            btnJump.classList.remove('pressed');
        });

        // Legacy touch on canvas (swipe left/right, tap jump)
        let touchStartX = 0;
        let touchStartY = 0;
        let touchActive = false;

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            touchStartX = touch.clientX;
            touchStartY = touch.clientY;
            touchActive = true;
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!touchActive) return;
            const touch = e.touches[0];
            const dx = touch.clientX - touchStartX;
            if (dx < -20) { keys['ArrowLeft'] = true; keys['ArrowRight'] = false; }
            else if (dx > 20) { keys['ArrowRight'] = true; keys['ArrowLeft'] = false; }
            else { keys['ArrowLeft'] = false; keys['ArrowRight'] = false; }
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            keys['ArrowLeft'] = false;
            keys['ArrowRight'] = false;
            touchActive = false;
            if (Math.abs(e.changedTouches[0].clientX - touchStartX) < 20 &&
                Math.abs(e.changedTouches[0].clientY - touchStartY) < 20) {
                keys[' '] = true;
                setTimeout(() => keys[' '] = false, 100);
            }
        }, { passive: false });

        // Initialize
        buildLevel();
        gameLoop();
    </script>
</body>
</html>
