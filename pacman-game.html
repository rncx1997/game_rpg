<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pacman Pixel - Main Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            touch-action: none;
        }
        .game-wrapper { position: relative; width: 100%; max-width: 560px; text-align: center; }
        .game-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 14px; background: #1a1a2e;
            border: 2px solid #333; border-bottom: none;
            color: #fff; font-size: 14px; font-weight: bold;
        }
        .game-header .score { color: #fbbf24; }
        canvas {
            display: block; width: 100%; aspect-ratio: 1/1;
            border: 2px solid #333;
            image-rendering: pixelated; image-rendering: crisp-edges;
        }
        .controls-info {
            color: #666; font-size: 10px; padding: 6px;
            background: #1a1a2e; border: 1px solid #333; border-top: none;
        }
        .back-link { display: inline-block; margin-top: 6px; color: #7c3aed; text-decoration: none; font-size: 12px; }

        .touch-controls {
            display: block; position: absolute;
            bottom: 36px; left: 0; right: 0;
            pointer-events: none; z-index: 10;
        }
        .dpad {
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            display: grid;
            grid-template-columns: 56px 56px 56px;
            grid-template-rows: 56px 56px;
            gap: 4px;
            pointer-events: auto;
        }
        .ctrl-btn {
            width: 56px; height: 56px; border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.8);
            font-size: 22px;
            display: flex; align-items: center; justify-content: center;
            touch-action: none; cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .ctrl-btn:active, .ctrl-btn.pressed {
            background: rgba(255,255,255,0.2);
            transform: scale(0.92);
        }
        .btn-up { grid-column: 2; grid-row: 1; }
        .btn-left { grid-column: 1; grid-row: 2; }
        .btn-down { grid-column: 2; grid-row: 2; }
        .btn-right { grid-column: 3; grid-row: 2; }

        @media (max-width: 400px) {
            .dpad { grid-template-columns: 48px 48px 48px; grid-template-rows: 48px 48px; gap: 3px; }
            .ctrl-btn { width: 48px; height: 48px; font-size: 18px; }
        }
    </style>
</head>
<body>
    <div class="game-wrapper">
        <div class="game-header">
            <span>PAC-MAN <span style="color:#fbbf24;">PIXEL</span></span>
            <span>SKOR: <span class="score" id="scoreDisplay">0</span></span>
        </div>
        <div style="position:relative;display:inline-block;width:100%;">
            <canvas id="gameCanvas" width="560" height="560"></canvas>
            <div class="touch-controls">
                <div class="dpad">
                    <button class="ctrl-btn btn-up" id="btnUp">&#x25B2;</button>
                    <button class="ctrl-btn btn-left" id="btnLeft">&#x25C0;</button>
                    <button class="ctrl-btn btn-down" id="btnDown">&#x25BC;</button>
                    <button class="ctrl-btn btn-right" id="btnRight">&#x25B6;</button>
                </div>
            </div>
        </div>
        <div class="controls-info"><kbd>&larr;</kbd> <kbd>&uarr;</kbd> <kbd>&darr;</kbd> <kbd>&rarr;</kbd> Gerak &nbsp;|&nbsp; <kbd>R</kbd> Restart</div>
        <a href="index.html" class="back-link">&larr; Kembali</a>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreDisplay');

        const TILE = 28;
        const COLS = 20;
        const ROWS = 20;
        const W = COLS * TILE;
        const H = ROWS * TILE;

        let score = 0;
        let gameOver = false;
        let gameWin = false;

        const DIR = { UP: 0, DOWN: 1, LEFT: 2, RIGHT: 3 };

        const maze = [
            "####################",
            "#............#.....#",
            "#.####.#####.#.###.#",
            "#.####.#####.#.###.#",
            "#.....#...#.....#.#",
            "#.###.#.###.###.#.#",
            "#.#...#...#...#...#",
            "#.#.###.#.###.###.#",
            "#.#.#.......#...#.#",
            "#.#.#.#####.#.###.#",
            "#...#.......#.....#",
            "#.###.#####.###.###",
            "#.#.#.......#...#.#",
            "#.#.#.#####.###.#.#",
            "#.#...#...#...#.#.#",
            "#.###.#.###.###.#.#",
            "#.....#...#.....#.#",
            "#.#####.###.###.#.#",
            "#.............#...#",
            "####################"
        ];

        let dots = [];
        let pacman = { tx: 0, ty: 0, dir: DIR.RIGHT, nextDir: DIR.RIGHT, progress: 0, mouth: 0, mouthDir: 1 };
        let ghosts = [];

        // Audio
        let audioCtx = null;
        function getAudioCtx() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            return audioCtx;
        }
        function playBeep(freq, duration, type, volume) {
            try {
                const ctx = getAudioCtx();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = type || 'square';
                osc.frequency.setValueAtTime(freq, ctx.currentTime);
                gain.gain.setValueAtTime(volume || 0.1, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + duration);
            } catch(e) {}
        }
        function playDotSound() {
            playBeep(6000, 0.06, 'square', 0.08);
        }
        function playGameOverSound() {
            const notes = [400, 350, 300, 200];
            notes.forEach((f, i) => {
                setTimeout(() => playBeep(f, 0.15, 'sawtooth', 0.1), i * 150);
            });
        }
        function playWinSound() {
            const notes = [400, 500, 600, 800, 1000];
            notes.forEach((f, i) => {
                setTimeout(() => playBeep(f, 0.12, 'square', 0.08), i * 120);
            });
        }

        function buildLevel() {
            dots = [];
            ghosts = [];
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (maze[r][c] === '.') {
                        dots.push({ x: c, y: r, eaten: false });
                    }
                }
            }

            // Place pacman
            pacman.tx = 9;
            pacman.ty = 15;
            pacman.progress = 0;
            pacman.dir = DIR.LEFT;
            pacman.nextDir = DIR.LEFT;

            // Ghosts
            const ghostColors = ['#ff0000', '#ffb8ff', '#00ffff', '#ffb852'];
            const ghostPositions = [{ x: 9, y: 8 }, { x: 8, y: 8 }, { x: 10, y: 8 }, { x: 9, y: 7 }];
            for (let i = 0; i < 4; i++) {
                ghosts.push({
                    tx: ghostPositions[i].x,
                    ty: ghostPositions[i].y,
                    progress: 0,
                    color: ghostColors[i],
                    dir: DIR.UP,
                    frightened: false,
                    scatterTarget: [{ x: 1, y: 1 }, { x: 18, y: 1 }, { x: 1, y: 18 }, { x: 18, y: 18 }][i]
                });
            }
        }

        function isWall(x, y) {
            if (x < 0 || x >= COLS || y < 0 || y >= ROWS) return true;
            return maze[y][x] === '#';
        }

        function canMove(x, y) {
            return !isWall(x, y);
        }

        const PACMAN_SPEED = 0.125;
        const GHOST_SPEED = 0.08;

        function getDirVec(dir) {
            if (dir === DIR.LEFT) return { dx: -1, dy: 0 };
            if (dir === DIR.RIGHT) return { dx: 1, dy: 0 };
            if (dir === DIR.UP) return { dx: 0, dy: -1 };
            if (dir === DIR.DOWN) return { dx: 0, dy: 1 };
            return { dx: 0, dy: 0 };
        }

        function updatePacman() {
            // Try direction change at grid boundary
            if (pacman.progress === 0) {
                const nd = getDirVec(pacman.nextDir);
                if (canMove(pacman.tx + nd.dx, pacman.ty + nd.dy)) {
                    pacman.dir = pacman.nextDir;
                }
            }

            const d = getDirVec(pacman.dir);
            const canAdvance = canMove(pacman.tx + d.dx, pacman.ty + d.dy);

            if (canAdvance) {
                pacman.progress += PACMAN_SPEED;
                if (pacman.progress >= 1) {
                    pacman.tx += d.dx;
                    pacman.ty += d.dy;
                    pacman.progress = 0;
                }
            } else {
                pacman.progress = 0;
            }

            // Tunnel wrap
            if (pacman.tx < 0) { pacman.tx = COLS - 1; pacman.progress = 0; }
            if (pacman.tx >= COLS) { pacman.tx = 0; pacman.progress = 0; }

            // Eat dots
            for (const dot of dots) {
                if (!dot.eaten && dot.x === pacman.tx && dot.y === pacman.ty) {
                    dot.eaten = true;
                    score += 10;
                    playDotSound();
                    updateDisplay();
                }
            }

            if (dots.every(d => d.eaten)) {
                gameWin = true;
                playWinSound();
            }

            pacman.mouth += 0.15 * pacman.mouthDir;
            if (pacman.mouth > 1) pacman.mouthDir = -1;
            if (pacman.mouth < 0) pacman.mouthDir = 1;
        }

        function updateGhosts() {
            for (const ghost of ghosts) {
                // AI at grid boundary
                if (ghost.progress === 0) {
                    const dirs = [DIR.UP, DIR.DOWN, DIR.LEFT, DIR.RIGHT];
                    const possible = [];

                    for (const d of dirs) {
                        const v = getDirVec(d);
                        if (canMove(ghost.tx + v.dx, ghost.ty + v.dy) && d !== (ghost.dir ^ 1)) {
                            possible.push(d);
                        }
                    }

                    if (possible.length > 0) {
                        let bestDir = possible[0];
                        let bestDist = Infinity;
                        for (const d of possible) {
                            const v = getDirVec(d);
                            const dist = Math.abs(ghost.tx + v.dx - pacman.tx) + Math.abs(ghost.ty + v.dy - pacman.ty);
                            if (dist < bestDist) {
                                bestDist = dist;
                                bestDir = d;
                            }
                        }
                        if (Math.random() < 0.3 && possible.length > 1) {
                            const other = possible.filter(d => d !== bestDir);
                            ghost.dir = other[Math.floor(Math.random() * other.length)];
                        } else {
                            ghost.dir = bestDir;
                        }
                    }
                }

                const d = getDirVec(ghost.dir);
                const canAdvance = canMove(ghost.tx + d.dx, ghost.ty + d.dy);

                if (canAdvance) {
                    ghost.progress += GHOST_SPEED;
                    if (ghost.progress >= 1) {
                        ghost.tx += d.dx;
                        ghost.ty += d.dy;
                        ghost.progress = 0;
                    }
                } else {
                    ghost.progress = 0;
                    ghost.dir = (ghost.dir ^ 1);
                }

                if (ghost.tx < 0) { ghost.tx = COLS - 1; ghost.progress = 0; }
                if (ghost.tx >= COLS) { ghost.tx = 0; ghost.progress = 0; }
            }
        }

        function checkCollisions() {
            if (gameOver) return;
            for (const ghost of ghosts) {
                if (pacman.tx === ghost.tx && pacman.ty === ghost.ty) {
                    gameOver = true;
                    playGameOverSound();
                }
            }
        }

        function updateDisplay() {
            scoreSpan.textContent = score;
        }

        function update() {
            if (gameOver || gameWin) return;
            updatePacman();
            updateGhosts();
            checkCollisions();
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, W, H);

            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (maze[r][c] === '#') {
                        ctx.fillStyle = '#2121de';
                        ctx.fillRect(c * TILE, r * TILE, TILE, TILE);
                        ctx.fillStyle = '#0000aa';
                        ctx.fillRect(c * TILE + 2, r * TILE + 2, TILE - 4, TILE - 4);
                    }
                }
            }

            for (const dot of dots) {
                if (dot.eaten) continue;
                ctx.fillStyle = '#ffb8ae';
                ctx.beginPath();
                ctx.arc(dot.x * TILE + TILE / 2, dot.y * TILE + TILE / 2, 3, 0, Math.PI * 2);
                ctx.fill();
            }

            const dvec = getDirVec(pacman.dir);
            const px = (pacman.tx + dvec.dx * pacman.progress) * TILE + TILE / 2;
            const py = (pacman.ty + dvec.dy * pacman.progress) * TILE + TILE / 2;
            const mouthAngle = pacman.mouth * 0.3;
            let startAngle = 0;
            if (pacman.dir === DIR.RIGHT) startAngle = 0;
            else if (pacman.dir === DIR.DOWN) startAngle = Math.PI / 2;
            else if (pacman.dir === DIR.LEFT) startAngle = Math.PI;
            else if (pacman.dir === DIR.UP) startAngle = -Math.PI / 2;

            ctx.fillStyle = '#ffff00';
            ctx.beginPath();
            ctx.arc(px, py, TILE / 2 - 1, startAngle + mouthAngle, startAngle + Math.PI * 2 - mouthAngle);
            ctx.lineTo(px, py);
            ctx.fill();

            for (const ghost of ghosts) {
                const gd = getDirVec(ghost.dir);
                const gx = (ghost.tx + gd.dx * ghost.progress) * TILE + TILE / 2;
                const gy = (ghost.ty + gd.dy * ghost.progress) * TILE + TILE / 2;
                ctx.fillStyle = ghost.color;
                ctx.beginPath();
                ctx.arc(gx, gy, TILE / 2 - 2, Math.PI, 0);
                ctx.fill();
                ctx.fillRect(gx - (TILE / 2 - 2), gy, TILE - 4, TILE / 4);
                // Eyes
                const ed = gd.dx !== 0 ? 4 : 3;
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(gx - ed, gy - 4, 3, 0, Math.PI * 2);
                ctx.arc(gx + ed, gy - 4, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#2121de';
                ctx.beginPath();
                ctx.arc(gx - ed + gd.dx * 1.5, gy - 4 + gd.dy * 1.5, 1.5, 0, Math.PI * 2);
                ctx.arc(gx + ed + gd.dx * 1.5, gy - 4 + gd.dy * 1.5, 1.5, 0, Math.PI * 2);
                ctx.fill();
            }

            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#fff';
                ctx.font = '40px "Courier New", monospace';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', W / 2, H / 2 - 10);
                ctx.font = '16px "Courier New", monospace';
                ctx.fillText('Tekan R untuk restart', W / 2, H / 2 + 30);
            }

            if (gameWin) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = '#fbbf24';
                ctx.font = '36px "Courier New", monospace';
                ctx.textAlign = 'center';
                ctx.fillText('KAMU MENANG!', W / 2, H / 2 - 10);
                ctx.fillStyle = '#fff';
                ctx.font = '16px "Courier New", monospace';
                ctx.fillText('Tekan R untuk main lagi', W / 2, H / 2 + 30);
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function resetGame() {
            score = 0;
            gameOver = false;
            gameWin = false;
            buildLevel();
            updateDisplay();
        }

        // Keyboard
        document.addEventListener('keydown', (e) => {
            const key = e.key;
            if (key === 'r' || key === 'R') { if (gameOver || gameWin) resetGame(); return; }
            if (gameOver || gameWin) return;
            if (key === 'ArrowUp' || key === 'w' || key === 'W') pacman.nextDir = DIR.UP;
            else if (key === 'ArrowDown' || key === 's' || key === 'S') pacman.nextDir = DIR.DOWN;
            else if (key === 'ArrowLeft' || key === 'a' || key === 'A') pacman.nextDir = DIR.LEFT;
            else if (key === 'ArrowRight' || key === 'd' || key === 'D') pacman.nextDir = DIR.RIGHT;
            e.preventDefault();
        });

        // Touch D-pad
        function setupBtn(id, dir) {
            const el = document.getElementById(id);
            const press = (e) => { e.preventDefault(); if (!gameOver && !gameWin) pacman.nextDir = dir; el.classList.add('pressed'); };
            const release = (e) => { e.preventDefault(); el.classList.remove('pressed'); };
            el.addEventListener('touchstart', press, { passive: false });
            el.addEventListener('touchend', release, { passive: false });
            el.addEventListener('touchcancel', release, { passive: false });
            el.addEventListener('mousedown', press);
            el.addEventListener('mouseup', release);
            el.addEventListener('mouseleave', release);
        }

        setupBtn('btnUp', DIR.UP);
        setupBtn('btnDown', DIR.DOWN);
        setupBtn('btnLeft', DIR.LEFT);
        setupBtn('btnRight', DIR.RIGHT);

        buildLevel();
        gameLoop();
    </script>
</body>
</html>
